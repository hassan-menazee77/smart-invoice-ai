<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients - Smart Invoice AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">
  
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-40">
    <div class="flex flex-col h-full">
      <div class="p-6 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center">
          <i class="fas fa-bolt text-white text-sm"></i>
        </div>
        <span class="font-bold text-lg">Smart Invoice</span>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-chart-pie w-5"></i> Dashboard</a>
        <a href="invoice-create.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-plus-circle w-5"></i> Create Invoice</a>
        <a href="invoice-list.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-file-invoice w-5"></i> Invoices</a>
        <a href="clients.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-users w-5"></i> Clients</a>
        <a href="templates.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-palette w-5"></i> Templates</a>
        <a href="payments.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-credit-card w-5"></i> Payments</a>
        <a href="analytics.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-chart-line w-5"></i> Analytics</a>
        <a href="ai-assistant.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-robot w-5"></i> AI Assistant</a>
      </nav>
      <div class="p-4 border-t border-gray-200 dark:border-gray-800">
        <a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-cog w-5"></i> Settings</a>
      </div>
    </div>
  </aside>
  
  <div id="sidebarBackdrop" class="sidebar-backdrop lg:hidden"></div>
  
  <div class="lg:ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-30 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800">
      <div class="px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button id="mobileMenuBtn" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i class="fas fa-bars"></i></button>
          <h1 class="text-xl font-semibold">Clients</h1>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="openAddClientModal()" class="btn btn-primary text-sm"><i class="fas fa-plus"></i> Add Client</button>
          <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i id="themeIcon" class="fas fa-moon text-gray-500"></i></button>
          <div class="relative">
            <button id="userMenuBtn" class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition">
              <img id="userAvatar" src="" alt="" class="w-8 h-8 rounded-full">
              <div class="hidden md:block text-left"><div id="userName" class="text-sm font-medium"></div><div id="userPlan" class="text-xs"></div></div>
              <i class="fas fa-chevron-down text-xs text-gray-400"></i>
            </button>
            <div id="userMenu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 py-2 z-50">
              <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700"><div id="userEmail" class="text-sm text-gray-600 dark:text-gray-400"></div></div>
              <a href="settings.html" class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition"><i class="fas fa-user text-gray-400 w-5"></i> Profile</a>
              <a href="settings.html" class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition"><i class="fas fa-cog text-gray-400 w-5"></i> Settings</a>
              <div class="border-t border-gray-200 dark:border-gray-700 mt-2 pt-2">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition"><i class="fas fa-sign-out-alt w-5"></i> Sign Out</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    
    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <div class="card p-4 mb-6">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="searchClients" class="form-input pl-10" placeholder="Search clients by name, email, or company...">
        </div>
      </div>
      
      <div id="clientsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      
      <div id="emptyState" class="hidden p-12 text-center">
        <div class="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-users text-gray-400 text-2xl"></i>
        </div>
        <h3 class="text-lg font-medium mb-2">No clients yet</h3>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Add your first client to get started</p>
        <button onclick="openAddClientModal()" class="btn btn-primary text-sm">Add Client</button>
      </div>
    </main>
  </div>
  
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modalTitle" class="text-lg font-semibold">Add Client</h3>
        <button onclick="App.closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form id="clientForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client Name</label>
          <input type="text" id="clientName" class="form-input" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
          <input type="email" id="clientEmail" class="form-input" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone</label>
          <input type="tel" id="clientPhone" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Address</label>
          <textarea id="clientAddress" class="form-input" rows="2"></textarea>
        </div>
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" onclick="App.closeModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Client</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) {}
    
    let allClients = [];
    let companyId = null;
    
    async function loadClients() {
      const company = await Auth.getCompany();
      if (!company) return;
      companyId = company.id;
      allClients = await DB.query('clients', 'companyId', company.id);
      renderClients();
      document.getElementById('searchClients').addEventListener('input', Utils.debounce(renderClients, 300));
    }
    
    function renderClients() {
      const search = document.getElementById('searchClients').value.toLowerCase();
      const filtered = allClients.filter(c => !search || c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search));
      
      const grid = document.getElementById('clientsGrid');
      const emptyState = document.getElementById('emptyState');
      
      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      grid.innerHTML = filtered.map(client => {
        const initials = client.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        return '<div class="card p-6 card-hover">' +
          '<div class="flex items-start justify-between mb-4">' +
            '<div class="flex items-center gap-3">' +
              '<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg">' + initials + '</div>' +
              '<div>' +
                '<h3 class="font-semibold">' + client.name + '</h3>' +
                '<p class="text-sm text-gray-500 dark:text-gray-400">' + client.email + '</p>' +
              '</div>' +
            '</div>' +
            App.formatStatus(client.status) +
          '</div>' +
          '<div class="space-y-2 mb-4">' +
            (client.phone ? '<p class="text-sm text-gray-600 dark:text-gray-400"><i class="fas fa-phone w-4 text-gray-400"></i> ' + client.phone + '</p>' : '') +
            (client.address ? '<p class="text-sm text-gray-600 dark:text-gray-400"><i class="fas fa-map-marker-alt w-4 text-gray-400"></i> ' + client.address + '</p>' : '') +
          '</div>' +
          '<div class="flex gap-2 pt-4 border-t border-gray-200 dark:border-gray-700">' +
            '<a href="invoice-create.html?client=' + client.id + '" class="flex-1 btn btn-primary text-sm text-center">New Invoice</a>' +
            '<button onclick="sendReminder(\'' + client.id + '\')" class="btn btn-secondary text-sm"><i class="fas fa-bell"></i></button>' +
            '<button onclick="deleteClient(\'' + client.id + '\')" class="btn btn-danger text-sm"><i class="fas fa-trash"></i></button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
    
    function openAddClientModal() {
      document.getElementById('clientForm').reset();
      App.openModal();
    }
    
    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const client = {
        id: Utils.uuid(),
        companyId: companyId,
        name: document.getElementById('clientName').value,
        email: document.getElementById('clientEmail').value,
        phone: document.getElementById('clientPhone').value,
        address: document.getElementById('clientAddress').value,
        status: 'active',
        createdAt: new Date().toISOString()
      };
      await DB.add('clients', client);
      allClients.push(client);
      renderClients();
      App.closeModal();
      App.toast('Client added successfully', 'success');
    });
    
    async function sendReminder(clientId) {
      const client = allClients.find(c => c.id === clientId);
      App.toast('Payment reminder sent to ' + client.name, 'success');
    }
    
    async function deleteClient(id) {
      App.confirm('Delete this client?', async () => {
        await DB.delete('clients', id);
        allClients = allClients.filter(c => c.id !== id);
        renderClients();
        App.toast('Client deleted', 'success');
      });
    }
    
    document.addEventListener('DOMContentLoaded', loadClients);
  </script>
</body>
</html>
