<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - Smart Invoice AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">
  
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-40">
    <div class="flex flex-col h-full">
      <div class="p-6 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center">
          <i class="fas fa-bolt text-white text-sm"></i>
        </div>
        <span class="font-bold text-lg">Smart Invoice</span>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-chart-pie w-5"></i> Dashboard</a>
        <a href="invoice-create.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-plus-circle w-5"></i> Create Invoice</a>
        <a href="invoice-list.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-file-invoice w-5"></i> Invoices</a>
        <a href="clients.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-users w-5"></i> Clients</a>
        <a href="templates.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-palette w-5"></i> Templates</a>
        <a href="payments.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-credit-card w-5"></i> Payments</a>
        <a href="analytics.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-chart-line w-5"></i> Analytics</a>
        <a href="ai-assistant.html" class="sidebar-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-robot w-5"></i> AI Assistant</a>
      </nav>
      <div class="p-4 border-t border-gray-200 dark:border-gray-800">
        <a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition"><i class="fas fa-cog w-5"></i> Settings</a>
      </div>
    </div>
  </aside>
  
  <div id="sidebarBackdrop" class="sidebar-backdrop lg:hidden"></div>
  
  <div class="lg:ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-30 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800">
      <div class="px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button id="mobileMenuBtn" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i class="fas fa-bars"></i></button>
          <h1 class="text-xl font-semibold">Invoices</h1>
        </div>
        <div class="flex items-center gap-4">
          <a href="invoice-create.html" class="btn btn-primary text-sm"><i class="fas fa-plus"></i> New Invoice</a>
          <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition"><i id="themeIcon" class="fas fa-moon text-gray-500"></i></button>
          <div class="relative">
            <button id="userMenuBtn" class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition">
              <img id="userAvatar" src="" alt="" class="w-8 h-8 rounded-full">
              <div class="hidden md:block text-left"><div id="userName" class="text-sm font-medium"></div><div id="userPlan" class="text-xs"></div></div>
              <i class="fas fa-chevron-down text-xs text-gray-400"></i>
            </button>
            <div id="userMenu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 py-2 z-50">
              <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700"><div id="userEmail" class="text-sm text-gray-600 dark:text-gray-400"></div></div>
              <a href="settings.html" class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition"><i class="fas fa-user text-gray-400 w-5"></i> Profile</a>
              <a href="settings.html" class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition"><i class="fas fa-cog text-gray-400 w-5"></i> Settings</a>
              <div class="border-t border-gray-200 dark:border-gray-700 mt-2 pt-2">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition"><i class="fas fa-sign-out-alt w-5"></i> Sign Out</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    
    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <!-- Filters -->
      <div class="card p-4 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1 relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" class="form-input pl-10" placeholder="Search invoices by number, client, or amount...">
          </div>
          <div class="flex gap-3">
            <select id="statusFilter" class="form-input w-auto">
              <option value="">All Status</option>
              <option value="paid">Paid</option>
              <option value="pending">Pending</option>
              <option value="overdue">Overdue</option>
              <option value="draft">Draft</option>
            </select>
            <select id="sortBy" class="form-input w-auto">
              <option value="date-desc">Newest First</option>
              <option value="date-asc">Oldest First</option>
              <option value="amount-desc">Highest Amount</option>
              <option value="amount-asc">Lowest Amount</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- Invoices Table -->
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Client</th>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="invoicesTable"></tbody>
          </table>
        </div>
        <div id="emptyState" class="hidden p-12 text-center">
          <div class="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-file-invoice text-gray-400 text-2xl"></i>
          </div>
          <h3 class="text-lg font-medium mb-2">No invoices found</h3>
          <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Create your first invoice to get started</p>
          <a href="invoice-create.html" class="btn btn-primary text-sm">Create Invoice</a>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    let allInvoices = [];
    let allClients = [];
    
    async function loadInvoices() {
      const company = await Auth.getCompany();
      if (!company) return;
      
      allInvoices = await DB.query('invoices', 'companyId', company.id);
      allClients = await DB.query('clients', 'companyId', company.id);
      
      renderInvoices();
      
      // Setup filters
      document.getElementById('searchInput').addEventListener('input', Utils.debounce(renderInvoices, 300));
      document.getElementById('statusFilter').addEventListener('change', renderInvoices);
      document.getElementById('sortBy').addEventListener('change', renderInvoices);
    }
    
    function renderInvoices() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const sort = document.getElementById('sortBy').value;
      
      let filtered = allInvoices.filter(inv => {
        const client = allClients.find(c => c.id === inv.clientId);
        const matchesSearch = !search || 
          inv.invoiceNumber.toLowerCase().includes(search) ||
          (client?.name || '').toLowerCase().includes(search) ||
          inv.total.toString().includes(search);
        const matchesStatus = !status || inv.status === status;
        return matchesSearch && matchesStatus;
      });
      
      // Sort
      filtered.sort((a, b) => {
        switch(sort) {
          case 'date-asc': return new Date(a.issueDate) - new Date(b.issueDate);
          case 'amount-desc': return b.total - a.total;
          case 'amount-asc': return a.total - b.total;
          default: return new Date(b.issueDate) - new Date(a.issueDate);
        }
      });
      
      const tbody = document.getElementById('invoicesTable');
      const emptyState = document.getElementById('emptyState');
      
      if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      tbody.innerHTML = filtered.map(inv => {
        const client = allClients.find(c => c.id === inv.clientId);
        const isOverdue = inv.status !== 'paid' && inv.dueDate < new Date().toISOString().split('T')[0];
        
        return `
          <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition">
            <td class="font-medium">${inv.invoiceNumber}</td>
            <td class="text-gray-600 dark:text-gray-400">${client?.name || 'Unknown'}</td>
            <td class="text-gray-600 dark:text-gray-400">${Utils.formatDate(inv.issueDate)}</td>
            <td class="${isOverdue ? 'text-red-600 font-medium' : 'text-gray-600 dark:text-gray-400'}">${Utils.formatDate(inv.dueDate)}</td>
            <td class="font-medium">${Utils.formatCurrency(inv.total)}</td>
            <td>${App.formatStatus(inv.status)}</td>
            <td>
              <div class="flex items-center gap-2">
                <a href="invoice-view.html?id=${inv.id}" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 transition" title="View"><i class="fas fa-eye"></i></a>
                <a href="invoice-create.html?edit=${inv.id}" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 transition" title="Edit"><i class="fas fa-edit"></i></a>
                <button onclick="deleteInvoice('${inv.id}')" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 transition" title="Delete"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }
    
    async function deleteInvoice(id) {
      App.confirm('Are you sure you want to delete this invoice?', async () => {
        await DB.delete('invoices', id);
        await DB.delete('invoiceItems', id);
        allInvoices = allInvoices.filter(i => i.id !== id);
        renderInvoices();
        App.toast('Invoice deleted successfully', 'success');
      });
    }
    
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await Auth.requireAuth()) return;
      await loadInvoices();
    });
  </script>
</body>
</html>
